# Apache reverse-proxy vhost for AgentZero.
# Place at /etc/apache2/sites-available/agentzero.conf
# Replace agent.example.com with your real domain before enabling.
#
# Requires modules: proxy, proxy_http, ssl, headers
#   sudo a2enmod proxy proxy_http ssl headers
#
# The HTTPS block below is filled in automatically by certbot
# (`sudo certbot --apache -d agent.example.com`). You can start with just the
# port-80 vhost, run certbot, and it will generate the SSL vhost for you.

<VirtualHost *:80>
    ServerName agent.example.com

    # certbot will add the redirect to HTTPS here after you run it.
    # Telegram requires HTTPS, so plain HTTP is only used for the ACME challenge.

    ProxyPreserveHost On
    ProxyPass        /webhook  http://127.0.0.1:8080/webhook
    ProxyPassReverse /webhook  http://127.0.0.1:8080/webhook
    ProxyPass        /health   http://127.0.0.1:8080/health
    ProxyPassReverse /health   http://127.0.0.1:8080/health

    ErrorLog  ${APACHE_LOG_DIR}/agentzero_error.log
    CustomLog ${APACHE_LOG_DIR}/agentzero_access.log combined
</VirtualHost>

# --- After running certbot you'll get a *:443 vhost like this ---------------
# <VirtualHost *:443>
#     ServerName agent.example.com
#
#     ProxyPreserveHost On
#     ProxyPass        /webhook  http://127.0.0.1:8080/webhook
#     ProxyPassReverse /webhook  http://127.0.0.1:8080/webhook
#     ProxyPass        /health   http://127.0.0.1:8080/health
#     ProxyPassReverse /health   http://127.0.0.1:8080/health
#
#     SSLEngine on
#     SSLCertificateFile    /etc/letsencrypt/live/agent.example.com/fullchain.pem
#     SSLCertificateKeyFile /etc/letsencrypt/live/agent.example.com/privkey.pem
#
#     ErrorLog  ${APACHE_LOG_DIR}/agentzero_error.log
#     CustomLog ${APACHE_LOG_DIR}/agentzero_access.log combined
# </VirtualHost>
