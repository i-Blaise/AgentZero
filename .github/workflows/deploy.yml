name: Deploy AgentZero

# Runs the test suite on every push/PR, and on a push to `main` (or a manual
# trigger) SSHes into the VPS to pull the new code and restart the service.
#
# ─── Required repository secrets (Settings → Secrets and variables → Actions) ──
#   SSH_HOST   VPS public IP or hostname
#   SSH_USER   the login user that runs the deploy (must have the sudo rights below)
#   SSH_KEY    that user's PRIVATE SSH key (the matching public key is in the
#              user's ~/.ssh/authorized_keys on the VPS)
#   SSH_PORT   (optional) SSH port; defaults to 22
#
# ─── One-time setup on the VPS ────────────────────────────────────────────────
#   1. The code lives at /var/www/production/AgentZero, owned by www-data, and
#      was cloned with a GitHub deploy key so `git pull` works non-interactively:
#        sudo -u www-data git -C /var/www/production/AgentZero remote -v   # should list origin
#   2. SSH_USER can run these specific commands without a password prompt.
#      Add via `sudo visudo -f /etc/sudoers.d/agentzero-deploy`:
#        <SSH_USER> ALL=(www-data) NOPASSWD: /usr/bin/git, /var/www/production/AgentZero/venv/bin/pip
#        <SSH_USER> ALL=(root)     NOPASSWD: /usr/bin/systemctl restart agentzero
#
# If your repo is public, www-data needs no deploy key. If you deploy as a
# different user/path, adjust the secrets and the script below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /var/www/production/AgentZero
            sudo -u www-data git pull --ff-only origin main
            sudo -u www-data ./venv/bin/pip install -q -r requirements.txt
            sudo systemctl restart agentzero
            sleep 2
            systemctl is-active --quiet agentzero && echo "agentzero is running" || (echo "service failed to start" && exit 1)
