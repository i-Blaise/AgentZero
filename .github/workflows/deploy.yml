name: Deploy AgentZero

# Runs the test suite on every push/PR, and on a push to `main` (or a manual
# trigger) SSHes into the VPS (as root) to pull the new code and restart the service.
#
# ─── Required config (Settings → Secrets and variables → Actions) ─────────────
#   Variable  SERVER_HOST      VPS public IP or hostname
#   Secret    SERVER_SSH_KEY   the root user's PRIVATE SSH key (its matching
#                              public key is in /root/.ssh/authorized_keys on the VPS)
#
# ─── One-time setup on the VPS ────────────────────────────────────────────────
#   The code lives at /var/www/production/AgentZero, owned by www-data, and was
#   cloned with a GitHub deploy key so `git pull` works non-interactively:
#       sudo -u www-data git -C /var/www/production/AgentZero remote -v   # should list origin
#
#   The deploy runs as root, so no sudoers config is needed — root runs the
#   `sudo -u www-data` (git/pip as the owner) and `systemctl restart` lines
#   directly. If your repo is public, www-data needs no deploy key.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /var/www/production/AgentZero
            sudo -u www-data git pull --ff-only origin main
            sudo -u www-data ./venv/bin/pip install -q -r requirements.txt
            sudo systemctl restart agentzero
            sleep 2
            systemctl is-active --quiet agentzero && echo "agentzero is running" || (echo "service failed to start" && exit 1)
